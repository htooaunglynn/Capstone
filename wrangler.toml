name = "skillsprint"
main = "cloudflare/worker.js"
compatibility_date = "2026-06-13"
workers_dev = false

# Replace this route with the production hostname after the Cloudflare zone is ready.
# route = { pattern = "skillsprint.example.com/*", zone_name = "example.com" }

[vars]
DJANGO_DEBUG = "False"
DJANGO_SECURE_SSL_REDIRECT = "True"
DJANGO_SECURE_HSTS_SECONDS = "31536000"

[[containers]]
class_name = "SkillSprintContainer"
image = "./Dockerfile"
max_instances = 3

[[durable_objects.bindings]]
name = "SKILLSPRINT_CONTAINER"
class_name = "SkillSprintContainer"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SkillSprintContainer"]
